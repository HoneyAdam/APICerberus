openapi: 3.0.3
info:
  title: APICerebrus Admin API
  description: |
    Complete REST API for managing the APICerebrus API Gateway.
    Covers services, routes, upstreams, users, billing, audit logs, analytics, alerts,
    webhooks, bulk operations, GraphQL Federation, and real-time WebSocket.

    **Authentication**: All endpoints (except `/admin/login`, `/admin/logout`, and
    `/admin/api/v1/auth/token`) require a Bearer token obtained via the token endpoint.

    **Static auth alternative**: Use `X-Admin-Key` header on `/admin/api/v1/auth/token`
    to obtain a Bearer token.

    **Base URL**: `http://localhost:9876/admin/api/v1`
  version: 1.0.0
  contact:
    name: APICerebrus Team
    url: https://github.com/APICerberus/APICerebrus
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:9876/admin/api/v1
    description: Local development
  - url: https://api.apicerberus.com/admin/api/v1
    description: Production

security:
  - BearerAuth: []
  - AdminKey: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Status
    description: Gateway status and configuration
  - name: Services
    description: Service definitions
  - name: Routes
    description: Route definitions and URL mappings
  - name: Upstreams
    description: Load balancer upstream configuration
  - name: Users
    description: Consumer/user management
  - name: API Keys
    description: User API key management
  - name: Permissions
    description: Per-user route permissions
  - name: IP Whitelist
    description: Per-user IP address whitelists
  - name: Credits
    description: Credit balance and billing transactions
  - name: Audit Logs
    description: Request/response audit trail
  - name: Analytics
    description: Real-time and historical metrics
  - name: Alerts
    description: Alert rules and notifications
  - name: Billing
    description: Billing configuration and route costs
  - name: Subgraphs
    description: GraphQL Federation subgraph management
  - name: Webhooks
    description: Event webhook management
  - name: Bulk Operations
    description: Batch CRUD operations
  - name: GraphQL
    description: Admin GraphQL queries and mutations
  - name: WebSocket
    description: Real-time WebSocket stream

paths:
  # ─────────────────────── AUTH ───────────────────────
  /auth/token:
    post:
      summary: Issue admin Bearer token
      description: Authenticate with static admin key and receive a JWT bearer token.
      tags: [Auth]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_key:
                  type: string
                  description: Static admin key (also sent via X-Admin-Key header)
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      summary: Revoke admin session
      tags: [Auth]
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  logged_out:
                    type: boolean

  # ─────────────────────── STATUS ───────────────────────
  /status:
    get:
      summary: Gateway health status
      tags: [Status]
      responses:
        '200':
          description: Gateway status with database metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /info:
    get:
      summary: Gateway version and summary
      tags: [Status]
      responses:
        '200':
          description: Gateway info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  # ─────────────────────── CONFIG ───────────────────────
  /config/export:
    get:
      summary: Export current configuration
      tags: [Status]
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [yaml, json]
            default: yaml
      responses:
        '200':
          description: Configuration in requested format
          content:
            application/x-yaml:
              schema:
                type: string
            application/json:
              schema:
                type: string

  /config/import:
    post:
      summary: Import configuration
      tags: [Status]
      description: Upload a YAML/JSON configuration file. Accepts raw YAML up to 2MB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
          application/x-yaml:
            schema:
              type: string
      responses:
        '200':
          description: Configuration imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: boolean
                  summary:
                    $ref: '#/components/schemas/ConfigSummary'
        '400':
          $ref: '#/components/responses/BadRequest'

  /config/reload:
    post:
      summary: Reload configuration from file
      tags: [Status]
      responses:
        '200':
          description: Configuration reloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  reloaded:
                    type: boolean

  # ─────────────────────── SERVICES ───────────────────────
  /services:
    get:
      summary: List all services
      tags: [Services]
      responses:
        '200':
          description: Service list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'

    post:
      summary: Create a service
      tags: [Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'

  /services/{id}:
    get:
      summary: Get service by ID
      tags: [Services]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update a service
      tags: [Services]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'

    delete:
      summary: Delete a service
      tags: [Services]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Service deleted

  # ─────────────────────── ROUTES ───────────────────────
  /routes:
    get:
      summary: List all routes
      tags: [Routes]
      responses:
        '200':
          description: Route list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Route'

    post:
      summary: Create a route
      tags: [Routes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteCreate'
      responses:
        '201':
          description: Route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'

  /routes/{id}:
    get:
      summary: Get route by ID
      tags: [Routes]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Route details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'

    put:
      summary: Update a route
      tags: [Routes]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteCreate'
      responses:
        '200':
          description: Route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'

    delete:
      summary: Delete a route
      tags: [Routes]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Route deleted

  # ─────────────────────── UPSTREAMS ───────────────────────
  /upstreams:
    get:
      summary: List all upstreams
      tags: [Upstreams]
      responses:
        '200':
          description: Upstream list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Upstream'

    post:
      summary: Create an upstream
      tags: [Upstreams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamCreate'
      responses:
        '201':
          description: Upstream created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upstream'

  /upstreams/{id}:
    get:
      summary: Get upstream by ID
      tags: [Upstreams]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Upstream details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upstream'

    put:
      summary: Update an upstream
      tags: [Upstreams]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamCreate'
      responses:
        '200':
          description: Upstream updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upstream'

    delete:
      summary: Delete an upstream
      tags: [Upstreams]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Upstream deleted

  /upstreams/{id}/targets:
    post:
      summary: Add target to upstream
      tags: [Upstreams]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamTarget'
      responses:
        '201':
          description: Target added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamTarget'

  /upstreams/{id}/targets/{tid}:
    delete:
      summary: Remove target from upstream
      tags: [Upstreams]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: tid
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Target removed

  /upstreams/{id}/health:
    get:
      summary: Get upstream health status
      tags: [Upstreams]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Health check results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResult'

  # ─────────────────────── USERS ───────────────────────
  /users:
    get:
      summary: List users
      tags: [Users]
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, suspended, inactive] }
        - name: role
          in: query
          schema: { type: string }
        - name: sort_by
          in: query
          schema: { type: string, default: created_at }
        - name: sort_desc
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 1000 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer

    post:
      summary: Create a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    put:
      summary: Update a user
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      summary: Delete a user
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: User deleted

  /users/{id}/suspend:
    post:
      summary: Suspend a user
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string, example: suspended }

  /users/{id}/activate:
    post:
      summary: Activate a user
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string, example: active }

  /users/{id}/status:
    put:
      summary: Update user status
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, suspended, inactive]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string }

  /users/{id}/reset-password:
    post:
      summary: Reset user password
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  password_reset: { type: boolean }

  # ─────────────────────── API KEYS ───────────────────────
  /users/{id}/api-keys:
    get:
      summary: List user API keys
      tags: [API Keys]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKey'

    post:
      summary: Create an API key
      tags: [API Keys]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                mode: { type: string, enum: [live, test], default: live }
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  full_key: { type: string, description: Full key value (shown only once) }
                  key: { type: string }

  /users/{id}/api-keys/{keyId}:
    delete:
      summary: Revoke an API key
      tags: [API Keys]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: keyId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: API key revoked

  # ─────────────────────── PERMISSIONS ───────────────────────
  /users/{id}/permissions:
    get:
      summary: List user permissions
      tags: [Permissions]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EndpointPermission'

    post:
      summary: Create a permission
      tags: [Permissions]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndpointPermission'

  /users/{id}/permissions/{pid}:
    put:
      summary: Update a permission
      tags: [Permissions]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: pid
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndpointPermission'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointPermission'

    delete:
      summary: Delete a permission
      tags: [Permissions]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: pid
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Permission deleted

  /users/{id}/permissions/bulk:
    post:
      summary: Bulk assign permissions
      tags: [Permissions]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permissions]
              properties:
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/EndpointPermission'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  assigned: { type: integer }

  # ─────────────────────── IP WHITELIST ───────────────────────
  /users/{id}/ip-whitelist:
    get:
      summary: Get user IP whitelist
      tags: [IP Whitelist]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ip_whitelist:
                    type: array
                    items: { type: string }

    post:
      summary: Add IPs to whitelist
      tags: [IP Whitelist]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ip: { type: string }
                ips:
                  type: array
                  items: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ip_whitelist:
                    type: array
                    items: { type: string }

  /users/{id}/ip-whitelist/{ip}:
    delete:
      summary: Remove IP from whitelist
      tags: [IP Whitelist]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: ip
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ip_whitelist:
                    type: array
                    items: { type: string }

  # ─────────────────────── CREDITS ───────────────────────
  /credits/overview:
    get:
      summary: Global credit overview
      tags: [Credits]
      responses:
        '200':
          description: Credit statistics across all users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditOverview'

  /users/{id}/credits:
    post:
      summary: Adjust credits (topup or deduct)
      tags: [Credits]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, reason]
              properties:
                amount: { type: integer, minimum: 1 }
                action: { type: string, enum: [topup, deduct] }
                reason: { type: string }
                request_id: { type: string }
                route_id: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditAdjustment'

    get:
      summary: User credit overview with recent transactions
      tags: [Credits]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  balance: { type: integer }
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/CreditTransaction'

  /users/{id}/credits/topup:
    post:
      summary: Top up credits
      tags: [Credits]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, reason]
              properties:
                amount: { type: integer, minimum: 1 }
                reason: { type: string }
                request_id: { type: string }
                route_id: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditAdjustment'

  /users/{id}/credits/deduct:
    post:
      summary: Deduct credits
      tags: [Credits]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, reason]
              properties:
                amount: { type: integer, minimum: 1 }
                reason: { type: string }
                request_id: { type: string }
                route_id: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditAdjustment'

  /users/{id}/credits/balance:
    get:
      summary: Get user credit balance
      tags: [Credits]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  balance: { type: integer }

  /users/{id}/credits/transactions:
    get:
      summary: List credit transactions
      tags: [Credits]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: type
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditListResult'

  # ─────────────────────── AUDIT LOGS ───────────────────────
  /audit-logs:
    get:
      summary: Search audit logs
      tags: [Audit Logs]
      parameters:
        - name: user_id
          in: query
          schema: { type: string }
        - name: api_key_prefix
          in: query
          schema: { type: string }
        - name: route
          in: query
          schema: { type: string }
        - name: method
          in: query
          schema: { type: string }
        - name: client_ip
          in: query
          schema: { type: string }
        - name: blocked
          in: query
          schema: { type: boolean }
        - name: block_reason
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string, description: Full-text search in path/body }
        - name: status_min
          in: query
          schema: { type: integer }
        - name: status_max
          in: query
          schema: { type: integer }
        - name: min_latency_ms
          in: query
          schema: { type: integer }
        - name: date_from
          in: query
          schema: { type: string, format: date-time }
        - name: date_to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
