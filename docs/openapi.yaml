  # ─────────────────────── WEBSOCKET ───────────────────────
  /ws:
    get:
      summary: Real-time WebSocket stream
      tags: [WebSocket]
      description: |
        Connect via WebSocket to receive real-time gateway events.
        Authentication via: Bearer cookie, `token` query param, Bearer header, or `api_key` query param.

        **Events pushed**: `connected`, `request_metric`, `health_change`
      responses:
        '101':
          description: WebSocket upgrade successful

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/token
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Static admin API key (min 32 characters). Only usable on /auth/token endpoint.

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Entity ID

  responses:
    Unauthorized:
      description: Invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: unauthorized
              message: Invalid credentials
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: not_found
              message: Resource not found
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Too many failed auth attempts
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: rate_limited
              message: Too many failed attempts. Try again later.

  schemas:
    # ── Common ──
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }

    # ── Auth ──
    TokenResponse:
      type: object
      properties:
        token_type: { type: string, example: Bearer }
        token: { type: string }
        expires_in: { type: integer, description: Token TTL in seconds }
        message: { type: string }

    # ── Status ──
    StatusResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        store:
          type: object
          properties:
            open_connections: { type: integer }
            in_use: { type: integer }
            idle: { type: integer }
            wait_count: { type: integer }
            wait_duration_ms: { type: number }
            max_open_conns: { type: integer }

    InfoResponse:
      type: object
      properties:
        version: { type: string }
        commit: { type: string }
        build_time: { type: string }
        uptime_sec: { type: number }
        summary:
          type: object
          properties:
            services: { type: integer }
            routes: { type: integer }
            upstreams: { type: integer }

    ConfigSummary:
      type: object
      properties:
        services: { type: integer }
        routes: { type: integer }
        upstreams: { type: integer }

    # ── Service ──
    Service:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        protocol: { type: string, enum: [http, https, grpc, graphql], default: http }
        upstream: { type: string }
        connect_timeout: { type: string, description: Go duration, e.g. 30s }
        read_timeout: { type: string }
        write_timeout: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ServiceCreate:
      type: object
      required: [name]
      properties:
        id: { type: string }
        name: { type: string }
        protocol: { type: string, enum: [http, https, grpc, graphql], default: http }
        upstream: { type: string }
        connect_timeout: { type: string }
        read_timeout: { type: string }
        write_timeout: { type: string }

    # ── Route ──
    Route:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        service: { type: string }
        hosts:
          type: array
          items: { type: string }
        paths:
          type: array
          items: { type: string }
        methods:
          type: array
          items: { type: string }
        strip_path: { type: boolean }
        preserve_host: { type: boolean }
        priority: { type: integer }
        plugins:
          type: array
          items:
            $ref: '#/components/schemas/PluginConfig'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RouteCreate:
      type: object
      required: [name, service, paths]
      properties:
        id: { type: string }
        name: { type: string }
        service: { type: string }
        hosts:
          type: array
          items: { type: string }
        paths:
          type: array
          items: { type: string }
        methods:
          type: array
          items: { type: string }
          default: [GET]
        strip_path: { type: boolean }
        preserve_host: { type: boolean }
        priority: { type: integer }
        plugins:
          type: array
          items:
            $ref: '#/components/schemas/PluginConfig'

    # ── Upstream ──
    Upstream:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        algorithm:
          type: string
          enum: [round_robin, weighted_round_robin, least_connections, ip_hash,
                 consistent_hash, random, least_latency, adaptive, health_weighted,
                 subnet_aware]
          default: round_robin
        targets:
          type: array
          items:
            $ref: '#/components/schemas/UpstreamTarget'
        health_check:
          $ref: '#/components/schemas/HealthCheck'

    UpstreamCreate:
      type: object
      required: [name]
      properties:
        id: { type: string }
        name: { type: string }
        algorithm:
          type: string
          enum: [round_robin, weighted_round_robin, least_connections, ip_hash,
                 consistent_hash, random, least_latency, adaptive, health_weighted,
                 subnet_aware]
          default: round_robin
        targets:
          type: array
          items:
            $ref: '#/components/schemas/UpstreamTarget'
        health_check:
          $ref: '#/components/schemas/HealthCheck'

    UpstreamTarget:
      type: object
      properties:
        id: { type: string }
        address: { type: string }
        weight: { type: integer, default: 100 }

    HealthCheck:
      type: object
      properties:
        active:
          type: object
          properties:
            enabled: { type: boolean }
            interval: { type: string }
            path: { type: string }
            timeout: { type: string }
            healthy_threshold: { type: integer }
            unhealthy_threshold: { type: integer }

    HealthCheckResult:
      type: object
      properties:
        upstream_id: { type: string }
        upstream_name: { type: string }
        targets:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              address: { type: string }
              healthy: { type: boolean }

    # ── User ──
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        company: { type: string }
        role: { type: string, enum: [admin, user] }
        status: { type: string, enum: [active, suspended, inactive] }
        credit_balance: { type: integer }
        ip_whitelist:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
        rate_limits:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserCreate:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        company: { type: string }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [admin, user], default: user }
        status: { type: string, enum: [active, suspended, inactive], default: active }
        initial_credits: { type: integer }
        credit_balance: { type: integer }

    UserUpdate:
      type: object
      properties:
        email: { type: string, format: email }
        name: { type: string }
        company: { type: string }
        role: { type: string, enum: [admin, user] }
        status: { type: string, enum: [active, suspended, inactive] }
        credit_balance: { type: integer }
        password: { type: string, minLength: 8 }
        ip_whitelist:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
        rate_limits:
          type: object
          additionalProperties: true

    # ── API Key ──
    APIKey:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        user_id: { type: string }
        key_prefix: { type: string, example: ck_live_ }
        mode: { type: string, enum: [live, test] }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }

    # ── Permission ──
    EndpointPermission:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        route_id: { type: string }
        methods:
          type: array
          items: { type: string }
        allowed: { type: boolean, default: true }
        rate_limits:
          type: object
          additionalProperties: true
        credit_cost: { type: integer }
        valid_from: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        allowed_days:
          type: array
          items: { type: integer }
        allowed_hours:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }

    # ── Credits ──
    CreditOverview:
      type: object
      properties:
        total_distributed: { type: integer }
        total_consumed: { type: integer }
        total_users: { type: integer }
        top_consumers:
          type: array
          items:
            type: object
            properties:
              user_id: { type: string }
              email: { type: string }
              name: { type: string }
              consumed: { type: integer }

    CreditAdjustment:
      type: object
      properties:
        user_id: { type: string }
        delta: { type: integer }
        new_balance: { type: integer }

    CreditTransaction:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        amount: { type: integer }
        balance_after: { type: integer }
        type: { type: string, enum: [topup, deduct, purchase, refund, adjustment] }
        reason: { type: string }
        request_id: { type: string }
        route_id: { type: string }
        created_at: { type: string, format: date-time }

    CreditListResult:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/CreditTransaction'
        total: { type: integer }

    # ── Audit ──
    AuditEntry:
      type: object
      properties:
        id: { type: string }
        request_id: { type: string }
        route_id: { type: string }
        route_name: { type: string }
        service_name: { type: string }
        user_id: { type: string }
        consumer_name: { type: string }
        method: { type: string }
        host: { type: string }
        path: { type: string }
        query: { type: string }
        status_code: { type: integer }
        latency_ms: { type: integer }
        bytes_in: { type: integer }
        bytes_out: { type: integer }
        client_ip: { type: string }
        user_agent: { type: string }
        blocked: { type: boolean }
        block_reason: { type: string }
        request_headers: { type: object, additionalProperties: true }
        request_body: { type: string }
        response_headers: { type: object, additionalProperties: true }
        response_body: { type: string }
        error_message: { type: string }
        created_at: { type: string, format: date-time }

    AuditSearchResult:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'
        total: { type: integer }

    AuditStats:
      type: object
      properties:
        total_requests: { type: integer }
        error_requests: { type: integer }
        error_rate: { type: number }
        avg_latency_ms: { type: number }
        top_routes:
          type: array
          items:
            type: object
            properties:
              route_id: { type: string }
              route_name: { type: string }
              count: { type: integer }
        top_users:
          type: array
          items:
            type: object
            properties:
              user_id: { type: string }
              consumer_name: { type: string }
              count: { type: integer }

    # ── Analytics ──
    AnalyticsOverview:
      type: object
      properties:
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        total_requests: { type: integer }
        active_conns: { type: integer }
        error_rate: { type: number }
        avg_latency_ms: { type: number }
        credits_consumed: { type: integer }
        lifetime_requests: { type: integer }
        lifetime_errors: { type: integer }

    TimeSeriesResponse:
      type: object
      properties:
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        granularity: { type: string }
        items:
          type: array
          items:
            type: object
            properties:
              timestamp: { type: string, format: date-time }
              requests: { type: integer }
              errors: { type: integer }
              avg_latency_ms: { type: number }
              p50_latency_ms: { type: number }
              p95_latency_ms: { type: number }
              p99_latency_ms: { type: number }
              status_codes:
                type: object
                additionalProperties: { type: integer }
              bytes_in: { type: integer }
              bytes_out: { type: integer }
              credits_consumed: { type: integer }

    ForecastResponse:
      type: object
      properties:
        metric: { type: string }
        route_id: { type: string }
        horizon: { type: integer }
        forecast:
          type: array
          items:
            type: object
            properties:
              timestamp: { type: string, format: date-time }
              value: { type: number }
              lower: { type: number }
              upper: { type: number }
        confidence: { type: number }
        trend: { type: string }
        seasonality: { type: string }
        generated_at: { type: string, format: date-time }

    AnomalyDetectionResponse:
      type: object
      properties:
        route_id: { type: string }
        metric: { type: string }
        threshold: { type: number }
        anomalies:
          type: array
          items:
            type: object
            properties:
              timestamp: { type: string, format: date-time }
              value: { type: number }
              expected: { type: number }
              z_score: { type: number }
              severity: { type: string }
        total_checked: { type: integer }
        anomaly_count: { type: integer }
        anomaly_rate: { type: number }
        generated_at: { type: string, format: date-time }

    CorrelationResponse:
      type: object
      properties:
        route_id: { type: string }
        correlations:
          type: array
          items:
            type: object
            properties:
              metric_1: { type: string }
              metric_2: { type: string }
              coefficient: { type: number }
              strength: { type: string }
              direction: { type: string }
        generated_at: { type: string, format: date-time }

    # ── Alerts ──
    AlertRule:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        enabled: { type: boolean }
        type: { type: string, enum: [error_rate, latency, throughput] }
        threshold: { type: number }
        window: { type: string, description: Go duration }
        cooldown: { type: string }
        action:
          type: object
          properties:
            type: { type: string, enum: [log, webhook, email] }
            target: { type: string }

    AlertHistoryEntry:
      type: object
      properties:
        rule_id: { type: string }
        triggered_at: { type: string, format: date-time }
        value: { type: number }
        threshold: { type: number }
        message: { type: string }

    # ── Billing ──
    BillingConfig:
      type: object
      properties:
        enabled: { type: boolean }
        default_cost: { type: integer }
        zero_balance_action: { type: string, enum: [reject, allow_with_flag] }
        test_mode_enabled: { type: boolean }
        route_costs:
          type: object
          additionalProperties: { type: integer }
        method_multipliers:
          type: object
          additionalProperties: { type: number }

    # ── Subgraph ──
    Subgraph:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }

    SubgraphCreate:
      type: object
      required: [name, url]
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }

    # ── Webhooks ──
    Webhook:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        active: { type: boolean, default: true }
        retry_count: { type: integer, default: 3 }
        retry_interval: { type: string, default: 60s }
        timeout: { type: string, default: 30s }
        created_at: { type: string, format: date-time }

    WebhookCreate:
      type: object
      required: [name, url, events]
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        active: { type: boolean, default: true }
        retry_count: { type: integer, default: 3 }
        retry_interval: { type: string }
        timeout: { type: string }

    WebhookEvent:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }

    WebhookDelivery:
      type: object
      properties:
        webhook_id: { type: string }
        event: { type: string }
        status_code: { type: integer }
        response: { type: string }
        attempt: { type: integer }
        delivered_at: { type: string, format: date-time }

    # ── Bulk ──
    BulkOperationResult:
      type: object
      properties:
        success: { type: boolean }
        created: { type: integer }
        updated: { type: integer }
        deleted: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              id: { type: string }
              code: { type: string }
              message: { type: string }
        timestamp: { type: string, format: date-time }

    BulkImportResult:
      type: object
      properties:
        success: { type: boolean }
        services:
          type: object
          properties:
            created: { type: integer }
            updated: { type: integer }
            skipped: { type: integer }
            failed: { type: integer }
        routes:
          type: object
          properties:
            created: { type: integer }
            updated: { type: integer }
            skipped: { type: integer }
            failed: { type: integer }
        upstreams:
          type: object
          properties:
            created: { type: integer }
            updated: { type: integer }
            skipped: { type: integer }
            failed: { type: integer }
        consumers:
          type: object
          properties:
            created: { type: integer }
            updated: { type: integer }
            skipped: { type: integer }
            failed: { type: integer }
        errors:
          type: array
          items:
            type: object
            properties:
              resource: { type: string }
              id: { type: string }
              message: { type: string }
        duration_ms: { type: number }
        timestamp: { type: string, format: date-time }

    # ── GraphQL ──
    GraphQLRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        variables:
          type: object
          additionalProperties: true
        operationName: { type: string }

    GraphQLResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            type: object
            properties:
              message: { type: string }
              locations:
                type: array
                items:
                  type: object
                  properties:
                    line: { type: integer }
                    column: { type: integer }
              path:
                type: array
                items: { type: string }

    # ── Plugin ──
    PluginConfig:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        enabled: { type: boolean }
        phase: { type: string, enum: [PRE_AUTH, AUTH, PRE_PROXY, PROXY, POST_PROXY] }
        config:
          type: object
          additionalProperties: true
