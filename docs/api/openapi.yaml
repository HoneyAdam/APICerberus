        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── WebSocket ───────────────────────────────────────────────────────────
  /admin/api/v1/ws:
    get:
      tags: [WebSocket]
      summary: WebSocket connection
      description: |
        Upgrade to WebSocket for real-time updates. Messages are JSON-encoded events:
        - `gateway.stats` - Gateway statistics update
        - `config.changed` - Configuration change notification
        - `alert.triggered` - Alert triggered event
      operationId: websocket
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key authentication

  parameters:
    ServiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Service ID
    RouteId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Route ID
    UpstreamId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Upstream ID
    TargetId:
      name: tid
      in: path
      required: true
      schema:
        type: string
      description: Target ID
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User ID
    APIKeyId:
      name: keyId
      in: path
      required: true
      schema:
        type: string
      description: API Key ID
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Items per page

  schemas:
    # ── Common ────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        version:
          type: string
        uptime:
          type: string

    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
        meta:
          type: object
          properties:
            request_id:
              type: string
            timestamp:
              type: string
              format: date-time

    # ── Gateway ───────────────────────────────────────────────────────────
    GatewayStatus:
      type: object
      properties:
        status:
          type: string
        store:
          type: object
          properties:
            open_connections:
              type: integer
            in_use:
              type: integer
            idle:
              type: integer
            wait_count:
              type: integer
            wait_duration_ms:
              type: integer
            max_open_conns:
              type: integer

    GatewayInfo:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        build_time:
          type: string
        uptime_sec:
          type: integer
        summary:
          type: object
          properties:
            services:
              type: integer
            routes:
              type: integer
            upstreams:
              type: integer

    BrandingConfig:
      type: object
      properties:
        app_name:
          type: string
        logo_url:
          type: string
        favicon_url:
          type: string
        primary_color:
          type: string
        accent_color:
          type: string
        theme_mode:
          type: string
          enum: [light, dark, system]

    # ── Service ───────────────────────────────────────────────────────────
    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        protocol:
          type: string
          enum: [http, https, grpc]
        upstream:
          type: string
        timeout:
          type: integer
        retries:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        protocol:
          type: string
          enum: [http, https, grpc]
          default: http
        upstream:
          type: string
        timeout:
          type: integer
          default: 30000
        retries:
          type: integer
          default: 3

    ServiceUpdateRequest:
      type: object
      properties:
        name:
          type: string
        protocol:
          type: string
        upstream:
          type: string
        timeout:
          type: integer
        retries:
          type: integer

    ServiceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Service'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer

    # ── Route ─────────────────────────────────────────────────────────────
    Route:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        service_id:
          type: string
        hosts:
          type: array
          items:
            type: string
        paths:
          type: array
          items:
            type: string
        methods:
          type: array
          items:
            type: string
            enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
        strip_path:
          type: boolean
        priority:
          type: integer
        plugins:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RouteCreateRequest:
      type: object
      required: [name, paths]
      properties:
        name:
          type: string
        service_id:
          type: string
        hosts:
          type: array
          items:
            type: string
        paths:
          type: array
          items:
            type: string
        methods:
          type: array
          items:
            type: string
        strip_path:
          type: boolean
          default: false
        priority:
          type: integer
          default: 0
        plugins:
          type: array
          items:
            type: object

    RouteUpdateRequest:
      type: object
      properties:
        name:
          type: string
        service_id:
          type: string
        hosts:
          type: array
          items:
            type: string
        paths:
          type: array
          items:
            type: string
        methods:
          type: array
          items:
            type: string
        strip_path:
          type: boolean
        priority:
          type: integer
        plugins:
          type: array
          items:
            type: object

    RouteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Route'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer

    # ── Upstream ──────────────────────────────────────────────────────────
    UpstreamDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        algorithm:
          type: string
          enum: [round_robin, weighted_round_robin, least_connections, ip_hash, consistent_hash, random, least_latency, adaptive, health_weighted, weighted_least_connections, subnet_aware]
        targets:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              address:
                type: string
              weight:
                type: integer
              healthy:
                type: boolean
        health_check:
          type: object
          properties:
            active:
              type: object
            passive:
              type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpstreamCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        algorithm:
          type: string
          enum: [round_robin, weighted_round_robin, least_connections, ip_hash, consistent_hash, random, least_latency, adaptive, health_weighted, weighted_least_connections, subnet_aware]
          default: round_robin
        targets:
          type: array
          items:
            type: object
            required: [address]
            properties:
              address:
                type: string
              weight:
                type: integer
                default: 100
        health_check:
          type: object

    UpstreamList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UpstreamDetail'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer

    # ── User ──────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user, readonly]
        status:
          type: string
          enum: [active, suspended]
        credits:
          type: integer
        rate_limit:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [email]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, user, readonly]
          default: user
        credits:
          type: integer
          default: 1000
        rate_limit:
          type: integer

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        credits:
          type: integer
        rate_limit:
          type: integer

    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer

    # ── API Key ───────────────────────────────────────────────────────────
    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        mode:
          type: string
          enum: [live, test]
        user_id:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # ── Credits ───────────────────────────────────────────────────────────
    CreditBalance:
      type: object
      properties:
        user_id:
          type: string
        balance:
          type: integer
        total_consumed:
          type: integer
        last_topup:
          type: string
          format: date-time

    CreditTransaction:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        type:
          type: string
          enum: [topup, deduct, adjustment]
        amount:
          type: integer
        balance_before:
          type: integer
        balance_after:
          type: integer
        reason:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Audit ─────────────────────────────────────────────────────────────
    AuditEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
        method:
          type: string
        path:
          type: string
        status_code:
          type: integer
        latency_ms:
          type: number
        ip:
          type: string
        user_agent:
          type: string
        request_body:
          type: string
        response_body:
          type: string

    # ── Alert ─────────────────────────────────────────────────────────────
    Alert:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        metric:
          type: string
        condition:
          type: string
        threshold:
          type: number
        window:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        enabled:
          type: boolean
        last_triggered:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    AlertCreateRequest:
      type: object
      required: [name, metric, condition, threshold]
      properties:
        name:
          type: string
        metric:
          type: string
        condition:
          type: string
          enum: [greater_than, less_than, equals, not_equals]
        threshold:
          type: number
        window:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
          default: warning
        enabled:
          type: boolean
          default: true

    # ── Billing ───────────────────────────────────────────────────────────
    BillingConfig:
      type: object
      properties:
        enabled:
          type: boolean
        default_credits:
          type: integer
        route_costs:
          type: object
          additionalProperties:
            type: integer
        method_multipliers:
          type: object
          additionalProperties:
            type: number

    # ── Cluster ───────────────────────────────────────────────────────────
    ClusterStatus:
      type: object
      properties:
        node_id:
          type: string
        state:
          type: string
          enum: [Leader, Follower, Candidate]
        term:
          type: integer
        commit_index:
          type: integer
        last_applied:
          type: integer
        log_size:
          type: integer
        peers:
          type: integer

    NodeList:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              address:
                type: string
              state:
                type: string
              is_leader:
                type: boolean
              is_healthy:
                type: boolean

    JoinRequest:
      type: object
      required: [node_id, address]
      properties:
        node_id:
          type: string
        address:
          type: string

    JoinResponse:
      type: object
      properties:
        success:
          type: boolean
        peers:
          type: object

    LeaveRequest:
      type: object
      required: [node_id]
      properties:
        node_id:
          type: string

    # ── Federation ────────────────────────────────────────────────────────
    Subgraph:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        health:
          type: string
          enum: [healthy, unhealthy, unknown]
        last_updated:
          type: string
          format: date-time

    SubgraphCreateRequest:
      type: object
      required: [name, url]
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string

    SupergraphSDL:
      type: object
      properties:
        sdl:
          type: string
        entities:
          type: array
          items:
            type: string

    # ── Webhooks ──────────────────────────────────────────────────────────
    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        enabled:
          type: boolean
          default: true

    # ── Bulk ──────────────────────────────────────────────────────────────
    BulkOperationResult:
      type: object
      properties:
        success:
          type: boolean
        created:
          type: integer
        updated:
          type: integer
        deleted:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              id:
                type: string
              code:
                type: string
              message:
                type: string
        timestamp:
          type: string
          format: date-time
