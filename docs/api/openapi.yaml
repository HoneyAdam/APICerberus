openapi: 3.0.0
info:
  title: API Cerberus Admin API
  description: |
    Administrative API for API Cerberus Gateway.

    ## Authentication

    All endpoints require authentication using one of:
    - **JWT Bearer Token**: `Authorization: Bearer <jwt_token>`
    - **API Key**: `X-API-Key: <api_key>`
    - **Admin API Key**: `Authorization: Bearer <admin_api_key>`

    ## Rate Limiting

    The Admin API has rate limiting applied. Default limits:
    - 100 requests per second per IP
    - 1000 requests per minute per user

    ## Response Format

    All responses are JSON with the following structure:

    **Success (2xx)**:
    ```json
    {
      "data": { ... },
      "meta": {
        "request_id": "uuid",
        "timestamp": "2024-01-01T00:00:00Z"
      }
    }
    ```

    **Error (4xx/5xx)**:
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Human readable message",
        "details": { ... }
      },
      "meta": {
        "request_id": "uuid",
        "timestamp": "2024-01-01T00:00:00Z"
      }
    }
    ```
  version: 1.0.0
  contact:
    name: API Cerberus Team
    email: maintainers@apicerberus.com
    url: https://apicerberus.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:9876
    description: Local development server
  - url: https://api.apicerberus.com
    description: Production server

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication and SSO
  - name: Gateway
    description: Gateway management and configuration
  - name: Services
    description: Backend service management
  - name: Routes
    description: Route configuration
  - name: Upstreams
    description: Upstream and load balancer management
  - name: Users
    description: User management
  - name: API Keys
    description: API key management
  - name: Credits
    description: Credit and billing operations
  - name: Permissions
    description: User permission management
  - name: IP Whitelist
    description: IP whitelist management
  - name: Audit Logs
    description: Audit log queries and management
  - name: Analytics
    description: Metrics, analytics, and forecasting
  - name: Billing
    description: Billing configuration and route costs
  - name: Alerts
    description: Alert rule management
  - name: Cluster
    description: Raft cluster management
  - name: Federation
    description: GraphQL federation management
  - name: Webhooks
    description: Webhook management and delivery
  - name: Bulk
    description: Bulk operations
  - name: GraphQL
    description: GraphQL admin endpoint
  - name: WebSocket
    description: Real-time WebSocket connection

paths:
  # ── Health ──────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns the health status of the gateway
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      description: Returns whether the gateway is ready to serve requests
      operationId: getReady
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Auth ────────────────────────────────────────────────────────────────
  /admin/api/v1/auth/token:
    post:
      tags: [Auth]
      summary: Issue JWT token
      description: Authenticates with a static admin API key and returns a JWT
      operationId: issueToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidates the current JWT token
      operationId: logout
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/auth/sso/login:
    get:
      tags: [Auth]
      summary: SSO login redirect
      description: Redirects to the configured OIDC provider login page
      operationId: ssoLogin
      security: []
      parameters:
        - name: redirect_url
          in: query
          schema:
            type: string
          description: URL to redirect after successful authentication
      responses:
        '302':
          description: Redirect to OIDC provider
        '400':
          description: SSO not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/auth/sso/callback:
    get:
      tags: [Auth]
      summary: SSO callback
      description: Handles the OIDC provider callback and issues a JWT
      operationId: ssoCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from OIDC provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter for CSRF protection
      responses:
        '302':
          description: Redirect to dashboard with token
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/auth/sso/status:
    get:
      tags: [Auth]
      summary: SSO status
      description: Returns the current SSO configuration status
      operationId: ssoStatus
      responses:
        '200':
          description: SSO status
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  provider:
                    type: string

  /admin/api/v1/auth/sso/logout:
    post:
      tags: [Auth]
      summary: SSO logout
      description: Logs out from SSO and invalidates the session
      operationId: ssoLogout
      responses:
        '200':
          description: SSO logout successful
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Gateway ─────────────────────────────────────────────────────────────
  /admin/api/v1/status:
    get:
      tags: [Gateway]
      summary: Gateway status
      description: Returns current gateway status and store metrics
      operationId: getGatewayStatus
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayStatus'

  /admin/api/v1/info:
    get:
      tags: [Gateway]
      summary: Gateway info
      description: Returns version, build info, uptime, and resource summary
      operationId: getGatewayInfo
      responses:
        '200':
          description: Info retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayInfo'

  /admin/api/v1/branding:
    get:
      tags: [Gateway]
      summary: Get branding configuration
      description: Returns the dashboard branding settings (authenticated)
      operationId: getBranding
      responses:
        '200':
          description: Branding configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandingConfig'

  /admin/api/v1/branding/public:
    get:
      tags: [Gateway]
      summary: Get public branding
      description: Returns branding settings without authentication (for login page)
      operationId: getBrandingPublic
      security: []
      responses:
        '200':
          description: Branding configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandingConfig'

  /admin/api/v1/config/export:
    get:
      tags: [Gateway]
      summary: Export configuration
      description: Exports the current gateway configuration as YAML (secrets redacted)
      operationId: exportConfig
      responses:
        '200':
          description: Configuration exported
          content:
            application/x-yaml:
              schema:
                type: string
        '500':
          description: Export failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/config/import:
    post:
      tags: [Gateway]
      summary: Import configuration
      description: Imports a gateway configuration from YAML payload
      operationId: importConfig
      requestBody:
        required: true
        content:
          application/x-yaml:
            schema:
              type: string
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Configuration imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: boolean
                  summary:
                    type: object
                    properties:
                      services:
                        type: integer
                      routes:
                        type: integer
                      upstreams:
                        type: integer
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/config/reload:
    post:
      tags: [Gateway]
      summary: Reload configuration
      description: Hot-reloads the gateway configuration without restart
      operationId: reloadConfig
      responses:
        '200':
          description: Configuration reloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  reloaded:
                    type: boolean
        '400':
          description: Reload failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Services ────────────────────────────────────────────────────────────
  /admin/api/v1/services:
    get:
      tags: [Services]
      summary: List services
      description: Returns all configured services
      operationId: listServices
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Services list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'

    post:
      tags: [Services]
      summary: Create service
      description: Creates a new backend service
      operationId: createService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/services/{id}:
    parameters:
      - $ref: '#/components/parameters/ServiceId'
    get:
      tags: [Services]
      summary: Get service
      description: Returns a specific service by ID
      operationId: getService
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Services]
      summary: Update service
      description: Updates a service configuration
      operationId: updateService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdateRequest'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Services]
      summary: Delete service
      description: Deletes a service
      operationId: deleteService
      responses:
        '204':
          description: Service deleted
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Routes ──────────────────────────────────────────────────────────────
  /admin/api/v1/routes:
    get:
      tags: [Routes]
      summary: List routes
      description: Returns all configured routes
      operationId: listRoutes
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Routes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteList'

    post:
      tags: [Routes]
      summary: Create route
      description: Creates a new route
      operationId: createRoute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteCreateRequest'
      responses:
        '201':
          description: Route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/routes/{id}:
    parameters:
      - $ref: '#/components/parameters/RouteId'
    get:
      tags: [Routes]
      summary: Get route
      description: Returns a specific route by ID
      operationId: getRoute
      responses:
        '200':
          description: Route details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '404':
          description: Route not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Routes]
      summary: Update route
      description: Updates a route
      operationId: updateRoute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteUpdateRequest'
      responses:
        '200':
          description: Route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '404':
          description: Route not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Routes]
      summary: Delete route
      description: Deletes a route
      operationId: deleteRoute
      responses:
        '204':
          description: Route deleted
        '404':
          description: Route not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Upstreams ───────────────────────────────────────────────────────────
  /admin/api/v1/upstreams:
    get:
      tags: [Upstreams]
      summary: List upstreams
      description: Returns all configured upstreams
      operationId: listUpstreams
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Upstreams list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamList'

    post:
      tags: [Upstreams]
      summary: Create upstream
      description: Creates a new upstream with load balancing configuration
      operationId: createUpstream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamCreateRequest'
      responses:
        '201':
          description: Upstream created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamDetail'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/upstreams/{id}:
    parameters:
      - $ref: '#/components/parameters/UpstreamId'
    get:
      tags: [Upstreams]
      summary: Get upstream
      description: Returns a specific upstream by ID
      operationId: getUpstream
      responses:
        '200':
          description: Upstream details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamDetail'
        '404':
          description: Upstream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Upstreams]
      summary: Update upstream
      description: Updates an upstream configuration
      operationId: updateUpstream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamCreateRequest'
      responses:
        '200':
          description: Upstream updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamDetail'
        '404':
          description: Upstream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Upstreams]
      summary: Delete upstream
      description: Deletes an upstream
      operationId: deleteUpstream
      responses:
        '204':
          description: Upstream deleted
        '404':
          description: Upstream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/upstreams/{id}/targets:
    parameters:
      - $ref: '#/components/parameters/UpstreamId'
    post:
      tags: [Upstreams]
      summary: Add upstream target
      description: Adds a new target to an upstream
      operationId: addUpstreamTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                weight:
                  type: integer
                  default: 100
                metadata:
                  type: object
      responses:
        '201':
          description: Target added
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  address:
                    type: string
                  weight:
                    type: integer
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Upstream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/upstreams/{id}/targets/{tid}:
    parameters:
      - $ref: '#/components/parameters/UpstreamId'
      - $ref: '#/components/parameters/TargetId'
    delete:
      tags: [Upstreams]
      summary: Remove upstream target
      description: Removes a target from an upstream
      operationId: deleteUpstreamTarget
      responses:
        '204':
          description: Target removed
        '404':
          description: Upstream or target not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/upstreams/{id}/health:
    parameters:
      - $ref: '#/components/parameters/UpstreamId'
    get:
      tags: [Upstreams]
      summary: Get upstream health
      description: Returns health status of all targets in an upstream
      operationId: getUpstreamHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  targets:
                    type: array
                    items:
                      type: object
                      properties:
                        address:
                          type: string
                        healthy:
                          type: boolean
                        latency_ms:
                          type: number
                        last_check:
                          type: string
                          format: date-time
        '404':
          description: Upstream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Users ───────────────────────────────────────────────────────────────
  /admin/api/v1/users:
    get:
      tags: [Users]
      summary: List users
      description: Returns a list of all users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'

    post:
      tags: [Users]
      summary: Create user
      description: Creates a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Get user
      description: Returns a specific user by ID
      operationId: getUser
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Users]
      summary: Update user
      description: Updates a user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Delete user
      description: Deletes a user
      operationId: deleteUser
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/users/{id}/activate:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Users]
      summary: Activate user
      description: Activates a suspended user
      operationId: activateUser
      responses:
        '200':
          description: User activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/users/{id}/suspend:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Users]
      summary: Suspend user
      description: Suspends a user account
      operationId: suspendUser
      responses:
        '200':
          description: User suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/users/{id}/status:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags: [Users]
      summary: Update user status
      description: Unified endpoint to update user status (active, suspended, etc.)
      operationId: updateUserStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, suspended]
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/v1/users/{id}/role:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags: [Users]
      summary: Update user role
      description: Changes the user role
      operationId: updateUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, user, readonly]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
