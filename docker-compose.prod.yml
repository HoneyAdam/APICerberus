# =============================================================================
# APICerebrus Docker Compose - Production
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Create config directory with apicerberus.yaml
#   2. Create certs directory with TLS certificates
#   3. Set environment variables in .env file
#   4. Ensure proper secrets management
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # APICerebrus Gateway (Production)
  # ---------------------------------------------------------------------------
  apicerberus:
    image: ${DOCKER_REGISTRY:-ghcr.io}/apicerberus/apicerberus:${VERSION:-latest}
    container_name: apicerberus-gateway
    restart: always
    deploy:
      replicas: ${REPLICAS:-2}
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
      - target: 8443
        published: 8443
        protocol: tcp
        mode: host
      - target: 9876
        published: 127.0.0.1:9876
        protocol: tcp
    volumes:
      - type: bind
        source: ./config/apicerberus.yaml
        target: /config/apicerberus.yaml
        read_only: true
      - type: volume
        source: apicerberus-data
        target: /data
      - type: bind
        source: ./certs
        target: /certs
        read_only: true
    environment:
      - APICERBERUS_CONFIG=/config/apicerberus.yaml
      - APICERBERUS_DATA_DIR=/data
      - APICERBERUS_LOG_LEVEL=${LOG_LEVEL:-warn}
      - APICERBERUS_LOG_FORMAT=json
    secrets:
      - jwt_secret
      - admin_api_key
    networks:
      - apicerberus-network
      - apicerberus-raft
    healthcheck:
      test: ["CMD", "/app/apicerberus", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service,environment"
        env: "OS_VERSION"

  # ---------------------------------------------------------------------------
  # Redis Cluster (Production)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: apicerberus-redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - apicerberus-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Prometheus (Production Monitoring)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: apicerberus-prometheus
    restart: always
    user: "65534:65534"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./deployments/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/docker/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - apicerberus-network

  # ---------------------------------------------------------------------------
  # AlertManager (Production Alerts)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: apicerberus-alertmanager
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./deployments/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - apicerberus-network

  # ---------------------------------------------------------------------------
  # Grafana (Production Dashboards)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: apicerberus-grafana
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      - GF_SECURITY_ADMIN_USER__FILE=/run/secrets/grafana_admin_user
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/apicerberus.json:ro
      - ./deployments/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - apicerberus-network
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Node Exporter (Host Metrics)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: apicerberus-node-exporter
    restart: always
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - apicerberus-network

  # ---------------------------------------------------------------------------
  # Cadvisor (Container Metrics)
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: apicerberus-cadvisor
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - apicerberus-network

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  admin_api_key:
    file: ./secrets/admin_api_key.txt
  grafana_admin_user:
    file: ./secrets/grafana_admin_user.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

volumes:
  apicerberus-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local

networks:
  apicerberus-network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
  apicerberus-raft:
    driver: overlay
    attachable: true
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
