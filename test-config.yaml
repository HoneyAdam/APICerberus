# APICerebrus minimal test configuration
gateway:
  http_addr: ":8080"
  https_addr: ""
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760

admin:
  addr: ":9876"
  api_key: "test-admin-key-32chars-minimum!!"
  token_secret: "test-token-secret-32chars-minimum!!"
  ui_enabled: true

portal:
  enabled: false

logging:
  level: "info"
  format: "json"
  output: "stdout"

store:
  path: "apicerberus-test.db"
  busy_timeout: "5s"
  journal_mode: "WAL"
  foreign_keys: true

billing:
  enabled: true
  default_cost: 1
