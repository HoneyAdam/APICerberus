# API Cerberus example configuration

gateway:
  http_addr: ":8080"
  https_addr: ""
  tls:
    auto: false
    acme_email: ""
    acme_dir: "acme-certs"
    cert_file: ""
    key_file: ""
    min_version: "1.2"
    cipher_suites:
      - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256"
  grpc:
    enabled: false
    addr: ":50051"
    enable_web: true
    enable_transcoding: true
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760

admin:
  addr: ":9876"
  api_key: ""                      # Required: must be a strong, unique secret
  token_secret: ""                 # Required: JWT signing secret (min 32 chars)
  allowed_origins: []               # WebSocket CORS allow-list (e.g. ["https://admin.example.com"])
  ui_enabled: true
  ui_path: "/dashboard"

portal:
  enabled: true
  addr: ":9877"
  path_prefix: "/portal"
  session:
    secret: ""                     # Required when portal is enabled (min 32 chars)
    cookie_name: "apicerberus_session"
    max_age: "24h"
    secure: true                   # Must be true when HTTPS is configured

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: ""
  rotation:
    max_size_mb: 100
    max_backups: 7
    compress: false

store:
  path: "apicerberus.db"
  busy_timeout: "5s"
  journal_mode: "WAL"
  foreign_keys: true

billing:
  enabled: true
  default_cost: 1
  route_costs:
    "users-api": 2
  method_multipliers:
    GET: 1.0
    POST: 1.5
  test_mode_enabled: true
  zero_balance_action: "reject"

# OpenTelemetry Tracing Configuration
tracing:
  enabled: false
  service_name: "apicerebrus"
  service_version: "1.0.0"
  exporter: "stdout"  # Options: stdout, otlp, otlp-http, otlp-grpc
  otlp_endpoint: "http://localhost:4318"  # OTLP endpoint (optional)
  otlp_headers:  # Additional headers for OTLP (optional)
    Authorization: "Bearer token"
  sampling_rate: 1.0  # 0.0 to 1.0 (1.0 = 100% sampling)
  batch_timeout: "5s"
  max_queue_size: 2048
  max_export_batch_size: 512
  attributes:  # Custom span attributes
    environment: "production"
    region: "us-east-1"

# Redis Configuration for Distributed Rate Limiting
redis:
  enabled: false
  address: "localhost:6379"
  password: ""  # Leave empty for no auth
  database: 0
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool_size: 10
  min_idle_conns: 2
  key_prefix: "ratelimit:"
  fallback_to_local: true  # Fall back to local rate limiting if Redis fails
  sync_local_on_miss: true  # Sync local state with Redis on cache miss

audit:
  enabled: true
  buffer_size: 10000
  batch_size: 100
  flush_interval: "1s"
  retention_days: 30
  route_retention_days:
    "ai-route": 90
    "health-route": 1
  archive_enabled: true
  archive_dir: "audit-archive"
  archive_compress: true
  cleanup_interval: "1h"
  cleanup_batch_size: 1000
  store_request_body: false
  store_response_body: false
  max_request_body_bytes: 65536
  max_response_body_bytes: 65536
  mask_headers:
    - "Authorization"
    - "X-API-Key"
  mask_body_fields:
    - "password"
    - "token"
  mask_replacement: "***REDACTED***"

services:
  - name: "user-service"
    protocol: "http"
    upstream: "user-upstream"
    connect_timeout: "5s"
    read_timeout: "30s"
    write_timeout: "30s"

routes:
  - name: "users-api"
    service: "user-service"
    hosts:
      - "api.example.com"
    paths:
      - "/api/v1/users"
      - "/api/v1/users/*"
    methods:
      - "GET"
      - "POST"
    strip_path: false
    priority: 100
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "fixed_window"
          scope: "route"
          limit: 300
          window: "1s"

upstreams:
  - name: "user-upstream"
    algorithm: "round_robin"
    targets:
      - address: "10.0.1.10:8080"
        weight: 100
      - address: "10.0.1.11:8080"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "10s"
        timeout: "2s"
        healthy_threshold: 2
        unhealthy_threshold: 3

auth:
  api_key:
    key_names:
      - "X-API-Key"
      - "Authorization"
    query_names:
      - "apikey"
      - "api_key"
    cookie_names:
      - "apikey"

global_plugins:
  - name: "cors"
    config:
      allowed_origins: []            # Configure explicit origins; wildcard (*) is unsafe
      allowed_methods:
        - "GET"
        - "POST"
        - "OPTIONS"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
      max_age: 600
  - name: "auth-apikey"
    config:
      key_names:
        - "X-API-Key"
        - "Authorization"

consumers:
  - name: "mobile-app"
    api_keys:
      - key: "ck_live_mobile_abc123"
    rate_limit:
      requests_per_second: 100
      burst: 150
    acl_groups:
      - "mobile-tier"
    metadata:
      app_name: "Mobile App"
