# API Cerberus example configuration

gateway:
  http_addr: ":8080"
  https_addr: ""
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760

admin:
  addr: ":9876"
  api_key: "change-me"
  ui_enabled: true
  ui_path: "/dashboard"

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: ""
  rotation:
    max_size_mb: 100
    max_backups: 7
    compress: false

store:
  path: "apicerberus.db"
  busy_timeout: "5s"
  journal_mode: "WAL"
  foreign_keys: true

billing:
  enabled: true
  default_cost: 1
  route_costs:
    "users-api": 2
  method_multipliers:
    GET: 1.0
    POST: 1.5
  test_mode_enabled: true
  zero_balance_action: "reject"

audit:
  enabled: true
  buffer_size: 10000
  batch_size: 100
  flush_interval: "1s"
  retention_days: 30
  route_retention_days:
    "ai-route": 90
    "health-route": 1
  archive_enabled: true
  archive_dir: "audit-archive"
  archive_compress: true
  cleanup_interval: "1h"
  cleanup_batch_size: 1000
  max_request_body_bytes: 65536
  max_response_body_bytes: 65536
  mask_headers:
    - "Authorization"
    - "X-API-Key"
  mask_body_fields:
    - "password"
    - "token"
  mask_replacement: "***REDACTED***"

services:
  - name: "user-service"
    protocol: "http"
    upstream: "user-upstream"
    connect_timeout: "5s"
    read_timeout: "30s"
    write_timeout: "30s"

routes:
  - name: "users-api"
    service: "user-service"
    hosts:
      - "api.example.com"
    paths:
      - "/api/v1/users"
      - "/api/v1/users/*"
    methods:
      - "GET"
      - "POST"
    strip_path: false
    priority: 100
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "fixed_window"
          scope: "route"
          limit: 300
          window: "1s"

upstreams:
  - name: "user-upstream"
    algorithm: "round_robin"
    targets:
      - address: "10.0.1.10:8080"
        weight: 100
      - address: "10.0.1.11:8080"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "10s"
        timeout: "2s"
        healthy_threshold: 2
        unhealthy_threshold: 3

auth:
  api_key:
    key_names:
      - "X-API-Key"
      - "Authorization"
    query_names:
      - "apikey"
      - "api_key"
    cookie_names:
      - "apikey"

global_plugins:
  - name: "cors"
    config:
      allowed_origins:
        - "*"
      allowed_methods:
        - "GET"
        - "POST"
        - "OPTIONS"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
      max_age: 600
  - name: "auth-apikey"
    config:
      key_names:
        - "X-API-Key"
        - "Authorization"

consumers:
  - name: "mobile-app"
    api_keys:
      - key: "ck_live_mobile_abc123"
    rate_limit:
      requests_per_second: 100
      burst: 150
    acl_groups:
      - "mobile-tier"
    metadata:
      app_name: "Mobile App"
