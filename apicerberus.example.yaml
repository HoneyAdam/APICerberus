# API Cerberus example configuration

gateway:
  http_addr: ":8080"
  https_addr: ""
  tls:
    auto: false
    acme_email: ""
    acme_dir: "acme-certs"
    cert_file: ""
    key_file: ""
    min_version: "1.2"
    cipher_suites:
      - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256"
  grpc:
    enabled: false
    addr: ":50051"
    enable_web: true
    enable_transcoding: true
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760
  # Connection pool for upstream proxying (zero values use defaults).
  connection_pool:
    max_idle_conns: 1000         # Total idle connections across all hosts
    max_idle_conns_per_host: 100 # Idle connections per upstream host
    idle_conn_timeout: "90s"     # Close idle connections after this duration
  # Trusted proxies for X-Forwarded-For / X-Real-IP parsing.
  # When empty (default), forwarding headers are IGNORED — RemoteAddr is used.
  # Supports individual IPs and CIDR ranges.
  trusted_proxies:
    - "10.0.0.0/8"       # Private network
    - "172.16.0.0/12"    # Private network
    - "192.168.0.0/16"   # Private network
    # - "203.0.113.10"   # Specific load balancer IP
  # Restricts access to /ready and /health/audit-drops endpoints.
  # When empty, internal details (DB connectivity, audit buffer) are exposed to all.
  # Configure to kubelet/node networks in Kubernetes deployments.
  # /health (status + uptime) remains fully open regardless of this setting.
  # allowed_health_ips:
  #   - "10.0.0.0/8"     # Kubernetes node network

admin:
  addr: ":9876"
  api_key: ""                      # Required: must be a strong, unique secret
  token_secret: ""                 # Required: JWT signing secret (min 32 chars)
  allowed_origins: []               # WebSocket CORS allow-list (e.g. ["https://admin.example.com"])
  ui_enabled: true
  ui_path: "/dashboard"
  # graphql_introspection: false  # F-012: Disable GraphQL introspection by default (recommended for production)

portal:
  enabled: true
  addr: ":9877"
  path_prefix: "/portal"
  session:
    secret: ""                     # Required when portal is enabled (min 32 chars)
    cookie_name: "apicerberus_session"
    max_age: "24h"
    secure: true                   # Must be true when HTTPS is configured

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: ""
  rotation:
    max_size_mb: 100
    max_backups: 7
    compress: false

store:
  path: "apicerberus.db"
  busy_timeout: "5s"
  journal_mode: "WAL"
  foreign_keys: true
  max_open_conns: 25
  synchronous: "NORMAL"         # NORMAL is safe with WAL; avoids fsync per write
  wal_autocheckpoint: 5000      # Less frequent checkpoints = higher write throughput
  cache_size: -64000            # 64 MB page cache (negative = KiB)

billing:
  enabled: true
  default_cost: 1
  route_costs:
    "users-api": 2
  method_multipliers:
    GET: 1.0
    POST: 1.5
  test_mode_enabled: true
  zero_balance_action: "reject"

# OpenTelemetry Tracing Configuration
tracing:
  enabled: false
  service_name: "apicerebrus"
  service_version: "1.0.0"
  exporter: "stdout"  # Options: stdout, otlp, otlp-http, otlp-grpc
  otlp_endpoint: "http://localhost:4318"  # OTLP endpoint (optional)
  otlp_headers:  # Additional headers for OTLP (optional)
    # Example: Authorization: "Bearer ${OTLP_AUTH_HEADER}"
    # Set via environment variable — never commit real tokens to version control
  sampling_rate: 1.0  # 0.0 to 1.0 (1.0 = 100% sampling)
  batch_timeout: "5s"
  max_queue_size: 2048
  max_export_batch_size: 512
  attributes:  # Custom span attributes
    environment: "production"
    region: "us-east-1"

# Redis Configuration for Distributed Rate Limiting
redis:
  enabled: false
  address: "localhost:6379"
  password: ""  # Leave empty for no auth
  database: 0
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool_size: 10
  min_idle_conns: 2
  key_prefix: "ratelimit:"
  fallback_to_local: true  # Fall back to local rate limiting if Redis fails
  sync_local_on_miss: true  # Sync local state with Redis on cache miss

audit:
  enabled: true
  buffer_size: 10000
  batch_size: 100
  flush_interval: "1s"
  retention_days: 30
  route_retention_days:
    "ai-route": 90
    "health-route": 1
  archive_enabled: true
  archive_dir: "audit-archive"
  archive_compress: true
  cleanup_interval: "1h"
  cleanup_batch_size: 1000
  store_request_body: false
  store_response_body: false
  max_request_body_bytes: 65536
  max_response_body_bytes: 65536
  mask_headers:
    - "Authorization"
    - "X-API-Key"
  mask_body_fields:
    - "password"
    - "token"
  mask_replacement: "***REDACTED***"

services:
  - name: "user-service"
    protocol: "http"
    upstream: "user-upstream"
    connect_timeout: "5s"
    read_timeout: "30s"
    write_timeout: "30s"

routes:
  - name: "users-api"
    service: "user-service"
    hosts:
      - "api.example.com"
    paths:
      - "/api/v1/users"
      - "/api/v1/users/*"
    methods:
      - "GET"
      - "POST"
    strip_path: false
    priority: 100
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "fixed_window"
          scope: "route"
          limit: 300
          window: "1s"
  # - name: "mock-route"
  #   paths:
  #     - "/api/v1/test"
  #   methods: ["GET"]
  #   plugins:
  #     - name: "mock"
  #       config:
  #         status_code: 200
  #         content_type: "application/json"
  #         body: '{"mock":true,"message":"This is a mock response"}'
  #         headers:
  #           X-Mock: "true"

# =============================================================================
# API VERSIONING PLUGIN
# =============================================================================
# Enable URL-based API versioning on a per-route basis.
# Extracts /v{N}/ from URL, adds X-API-Version header for upstream.
#
# Example route config:
#   routes:
#     - name: "api-v1"
#       paths: ["/v1/*"]
#       plugins:
#         - name: "versioning"
#           config:
#             versions: ["1", "2"]
#             default_version: "1"
#             strip_prefix: true          # Strip /v1/ before forwarding to upstream
#             header_name: "X-API-Version" # Header injected for upstream (default)
#             deprecation:
#               "1":
#                 sunset: "2026-12-31T00:00:00Z"
#                 message: "Migrate to v2 by end of 2026"
#                 link: "https://docs.example.com/api/v2-migration"
#               "0":
#                 disabled: true           # Returns 410 Gone for v0
#                 message: "v0 has been removed"

upstreams:
  - name: "user-upstream"
    algorithm: "round_robin"
    targets:
      - address: "10.0.1.10:8080"
        weight: 100
      - address: "10.0.1.11:8080"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "10s"
        timeout: "2s"
        healthy_threshold: 2
        unhealthy_threshold: 3

auth:
  api_key:
    key_names:
      - "X-API-Key"
      - "Authorization"
    query_names:
      - "apikey"
      - "api_key"
    cookie_names:
      - "apikey"

global_plugins:
  - name: "cors"
    config:
      allowed_origins: []            # Configure explicit origins; wildcard (*) is unsafe
      allowed_methods:
        - "GET"
        - "POST"
        - "OPTIONS"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
      max_age: 600
  - name: "auth-apikey"
    config:
      key_names:
        - "X-API-Key"
        - "Authorization"
  - name: "brotli"
    config:
      min_size: 256               # Minimum response body size (bytes) to compress
      quality: 6                  # Compression quality 0-11 (default: 6, higher = better but slower)
  # - name: "compression"         # Gzip compression (alternative to brotli)
  #   config:
  #     min_size: 256

consumers:
  - name: "mobile-app"
    api_keys:
      - key: ""                      # REQUIRED: generate a strong unique key (e.g. ck_live_...)
    rate_limit:
      requests_per_second: 100
      burst: 150
    acl_groups:
      - "mobile-tier"
    metadata:
      app_name: "Mobile App"

# =============================================================================
# CLUSTER CONFIGURATION (Raft-based clustering)
# =============================================================================
cluster:
  enabled: false                   # Enable Raft clustering for high availability
  node_id: ""                    # Unique node ID (e.g., "node-1")
  bind_address: ":12000"           # Raft RPC bind address
  peers: []                        # List of peer nodes: [{id: "node-2", address: "192.168.1.2:12000"}]
  election_timeout_min: 150ms      # Minimum election timeout
  election_timeout_max: 300ms      # Maximum election timeout
  heartbeat_interval: 50ms         # Leader heartbeat interval

  # Certificate synchronization across cluster (for ACME/domain certs)
  certificate_sync:
    enabled: true                  # Enable certificate sync via Raft
    storage_path: "./certs"        # Local cert storage path
    raft_replication: true         # Replicate certs via Raft log

  # Raft inter-node mTLS encryption (optional but recommended)
  mtls:
    enabled: false                 # Enable mTLS for Raft inter-node communication
    auto_generate: true            # Auto-generate CA and node certificates
    auto_cert_dir: "./certs/raft"  # Directory to store auto-generated certs
    # Manual certificate mode (if auto_generate: false):
    # ca_cert_path: "/path/to/ca.crt"      # Shared CA certificate
    # node_cert_path: "/path/to/node.crt"  # This node's certificate
    # node_key_path: "/path/to/node.key"   # This node's private key

# =============================================================================
# PLUGIN HOT-RELOAD CONFIGURATION
# =============================================================================
# Enable runtime plugin reload without gateway restart.
# When enabled, changes to plugin configuration files trigger registry rebuild.
#
# hot_reload:
#   enabled: true
#   watch_paths:            # Config files to watch for changes
#     - "/etc/apicerberus/plugins.d/"
#     - "./routes.d/"
#   poll_interval: "5s"     # How often to check for file changes (default 5s)
#   reload_on_change: true  # Rebuild plugin chains when config changes
