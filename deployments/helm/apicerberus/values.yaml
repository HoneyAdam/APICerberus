# Default values for apicerberus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: apicerberus/apicerberus
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 8080
  httpsPort: 8443
  adminPort: 8081

ingress:
  enabled: false
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: apicerberus.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: apicerberus-tls
      hosts:
        - apicerberus.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# API Cerberus specific configuration
config:
  server:
    address: "0.0.0.0:8080"
    read_timeout: "30s"
    write_timeout: "30s"
    idle_timeout: "120s"
    max_header_bytes: 1048576

  https:
    enabled: false
    address: "0.0.0.0:8443"
    cert_file: "/etc/apicerberus/certs/tls.crt"
    key_file: "/etc/apicerberus/certs/tls.key"

  logging:
    level: "info"
    format: "json"
    output: "stdout"

  auth:
    jwt:
      enabled: true
      secret: ""  # Will be generated or provided via secret
      issuer: "apicerberus"
      expiry: "24h"
    api_key:
      enabled: true
      header: "X-API-Key"

  rate_limiting:
    enabled: true
    requests_per_second: 1000
    burst_size: 1500
    per_user: true
    per_ip: true

  cache:
    enabled: true
    max_size: 104857600  # 100MB
    ttl: "5m"
    max_item_size: 10485760  # 10MB

  metrics:
    enabled: true
    endpoint: "/metrics"
    port: 8081

  tracing:
    enabled: false
    service_name: "apicerberus-gateway"
    endpoint: ""  # OTLP endpoint
    sample_rate: 0.1

  raft:
    enabled: false
    node_id: ""  # Auto-generated from pod name
    bind_address: "0.0.0.0:12000"
    peers: []

  federation:
    enabled: false
    endpoint: "/graphql"
    introspection: false
    query_batching: true
    parallel_execution: true

  admin:
    enabled: true
    address: "0.0.0.0:8081"
    api_key: ""  # Will be generated or provided via secret

# Secrets configuration
secrets:
  jwtSecret: ""
  adminApiKey: ""
  tls:
    enabled: false
    cert: ""
    key: ""

# Persistent storage
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

# Health checks
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Network policy
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Pod disruption budget (for zero-downtime rolling updates)
podDisruptionBudget:
  enabled: false
  minAvailable: 2       # Keep at least 2 pods running during disruptions
  # maxUnavailable: 1   # Alternative: allow max 1 pod down at a time
