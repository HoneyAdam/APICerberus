apiVersion: v1
kind: Secret
metadata:
  name: {{ include "apicerberus.fullname" . }}-secrets
  labels:
    {{- include "apicerberus.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from overwriting secrets on upgrade
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
{{- $secret := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "apicerberus.fullname" .)) }}
{{- if and $secret (index $secret.data "jwt-secret") }}
  jwt-secret: {{ index $secret.data "jwt-secret" | b64dec | quote }}
{{- else }}
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 32) | quote }}
{{- end }}
{{- if and $secret (index $secret.data "admin-api-key") }}
  admin-api-key: {{ index $secret.data "admin-api-key" | b64dec | quote }}
{{- else }}
  admin-api-key: {{ .Values.secrets.adminApiKey | default (randAlphaNum 32) | quote }}
{{- end }}
