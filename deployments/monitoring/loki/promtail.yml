# APICerebrus Promtail Configuration
# Log collector for APICerebrus

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # APICerebrus application logs
  - job_name: apicerberus-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: apicerberus
          __path__: /var/log/apicerberus/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: time
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          level:

  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  # Audit logs
  - job_name: apicerberus-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: apicerberus-audit
          __path__: /var/log/apicerberus/audit*.log
    pipeline_stages:
      - json:
          expressions:
            request_id: request_id
            user_id: user_id
            route: route
            status_code: status_code
      - labels:
          request_id:
          user_id:
          route:
          status_code:
