gateway:
  http_addr: ":8080"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_body_bytes: 10485760

admin:
  addr: ":9876"
  api_key: "test-admin-key-for-rolling-update-deployment-testing"
  token_secret: "test-jwt-secret-must-be-at-least-32-characters-long"

portal:
  enabled: false

logging:
  level: "info"
  format: "json"
  output: "stdout"

store:
  path: "/data/apicerberus.db"
  busy_timeout: "5s"
  journal_mode: "WAL"
  foreign_keys: true

billing:
  enabled: true
  default_cost: 1

rate_limit:
  enabled: true
  strategy: "token_bucket"
  requests_per_second: 1000
  burst_size: 1500

cluster:
  enabled: true
  node_id: ""  # Set via APICERBERUS_NODE_ID
  data_dir: "/data/raft"
  bind_address: "0.0.0.0:12000"
  peers: []  # Set via APICERBERUS_RAFT_PEERS
  mtls:
    enabled: false
