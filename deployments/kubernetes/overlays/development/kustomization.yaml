apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apicerberus-dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

replicas:
  - name: apicerberus
    count: 1

images:
  - name: ghcr.io/apicerberus/apicerberus
    newTag: dev

patches:
  - target:
      kind: ConfigMap
      name: apicerberus-config
    patch: |-
      - op: replace
        path: /data/apicerberus.yaml
        value: |
          server:
            address: "0.0.0.0:8080"
            read_timeout: "30s"
            write_timeout: "30s"
            idle_timeout: "120s"
          logging:
            level: "debug"
            format: "text"
          auth:
            jwt:
              enabled: true
              issuer: "apicerberus-dev"
              expiry: "24h"
          rate_limiting:
            enabled: true
            requests_per_second: 100
            burst_size: 150
          metrics:
            enabled: true
            endpoint: "/metrics"
            port: 9876
          admin:
            enabled: true
            address: "0.0.0.0:9876"
          portal:
            enabled: true
            address: "0.0.0.0:9877"

  - target:
      kind: Deployment
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"

  - target:
      kind: HorizontalPodAutoscaler
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  - target:
      kind: Ingress
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev-api.apicerberus.local
      - op: replace
        path: /spec/rules/1/host
        value: dev-admin.apicerberus.local
      - op: replace
        path: /spec/rules/2/host
        value: dev-portal.apicerberus.local
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - dev-api.apicerberus.local
          - dev-admin.apicerberus.local
          - dev-portal.apicerberus.local
