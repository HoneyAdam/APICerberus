apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apicerberus

# Use StatefulSet instead of Deployment for Raft clustering
resources:
  - ../../base/namespace.yaml
  - ../../base/serviceaccount.yaml
  - ../../base/secret.yaml
  - ../../base/service-headless.yaml
  - ../../base/statefulset.yaml
  - ../../base/service.yaml
  - ../../base/networkpolicy.yaml
  - ../../base/ingress.yaml
  - ../../base/servicemonitor.yaml

# Replace base configmap with Raft-enabled version
patches:
  - path: configmap-patch.yaml

commonLabels:
  app.kubernetes.io/name: apicerberus
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/variant: raft

images:
  - name: ghcr.io/apicerberus/apicerberus
    newTag: latest
