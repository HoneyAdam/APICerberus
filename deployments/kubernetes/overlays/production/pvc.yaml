apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apicerberus-data
  namespace: apicerberus-prod
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
