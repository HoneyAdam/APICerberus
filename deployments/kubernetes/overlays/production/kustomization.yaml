apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apicerberus-prod

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

replicas:
  - name: apicerberus
    count: 3

images:
  - name: ghcr.io/apicerberus/apicerberus
    newTag: v1.0.0

patches:
  - target:
      kind: ConfigMap
      name: apicerberus-config
    patch: |-
      - op: replace
        path: /data/apicerberus.yaml
        value: |
          server:
            address: "0.0.0.0:8080"
            read_timeout: "30s"
            write_timeout: "30s"
            idle_timeout: "120s"
            max_header_bytes: 1048576
          logging:
            level: "warn"
            format: "json"
            output: "stdout"
          auth:
            jwt:
              enabled: true
              issuer: "apicerberus"
              expiry: "24h"
            api_key:
              enabled: true
              header: "X-API-Key"
          rate_limiting:
            enabled: true
            requests_per_second: 1000
            burst_size: 1500
            per_user: true
            per_ip: true
          cache:
            enabled: true
            max_size: 104857600
            ttl: "5m"
          metrics:
            enabled: true
            endpoint: "/metrics"
            port: 9876
          tracing:
            enabled: true
            service_name: "apicerberus-gateway"
            sample_rate: 0.1
          admin:
            enabled: true
            address: "0.0.0.0:9876"
          portal:
            enabled: true
            address: "0.0.0.0:9877"
          raft:
            enabled: true
            bind_address: "0.0.0.0:12000"

  - target:
      kind: Deployment
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"

  - target:
      kind: HorizontalPodAutoscaler
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
      - op: add
        path: /spec/metrics/-
        value:
          type: Pods
          pods:
            metric:
              name: http_requests_per_second
            target:
              type: AverageValue
              averageValue: "1000"

  - target:
      kind: PodDisruptionBudget
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2

  - target:
      kind: Ingress
      name: apicerberus
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.apicerberus.com
      - op: replace
        path: /spec/rules/1/host
        value: admin.apicerberus.com
      - op: replace
        path: /spec/rules/2/host
        value: portal.apicerberus.com
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - api.apicerberus.com
          - admin.apicerberus.com
          - portal.apicerberus.com
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1rate-limit
        value: "100"

  # Add persistent volume for production data
  - target:
      kind: Deployment
      name: apicerberus
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: data-pvc
          persistentVolumeClaim:
            claimName: apicerberus-data
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/1
        value:
          name: data-pvc
          mountPath: /data

  # Enable topology spread constraints for high availability
  - target:
      kind: Deployment
      name: apicerberus
    patch: |-
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: apicerberus
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: apicerberus
