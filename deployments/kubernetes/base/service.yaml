apiVersion: v1
kind: Service
metadata:
  name: apicerberus
  namespace: apicerberus
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9876"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
    - name: admin
      port: 9876
      targetPort: admin
      protocol: TCP
    - name: portal
      port: 9877
      targetPort: portal
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
