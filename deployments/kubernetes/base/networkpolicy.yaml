apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apicerberus
  namespace: apicerberus
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: apicerberus
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP/HTTPS traffic
    - from: []
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    # Allow admin access from specific namespaces only
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9876
    # Allow internal communication
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: apicerberus
      ports:
        - protocol: TCP
          port: 12000
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound HTTP/HTTPS
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # Allow Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
