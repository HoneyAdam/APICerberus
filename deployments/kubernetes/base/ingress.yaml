apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apicerberus
  namespace: apicerberus
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: ingress
  annotations:
    # nginx ingress controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.example.com
        - admin.example.com
        - portal.example.com
      secretName: apicerberus-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apicerberus
                port:
                  number: 8080
    - host: admin.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apicerberus
                port:
                  number: 9876

    # NOTE: Admin API (port 9876) should NOT be exposed via ingress.
    # Access admin only via VPN/bastion host or through a dedicated admin ingress
    # with network-level access controls (e.g., IP allow-list at the load balancer).
    # Uncomment the following only if direct admin access is required and secured:
    # - host: admin.example.com
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: apicerberus
    #             port:
    #               number: 9876

    - host: portal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apicerberus
                port:
                  number: 9877
