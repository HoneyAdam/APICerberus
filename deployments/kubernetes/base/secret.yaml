apiVersion: v1
kind: Secret
metadata:
  name: apicerberus-secrets
  namespace: apicerberus
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # These values should be overridden in overlays or via external secret management
  # Use: kubectl create secret generic apicerberus-secrets \
  #   --from-literal=jwt-secret=$(openssl rand -base64 32) \
  #   --from-literal=admin-api-key=$(openssl rand -base64 32) \
  #   -n apicerberus
  jwt-secret: "CHANGE_ME_IN_PRODUCTION"
  admin-api-key: "CHANGE_ME_IN_PRODUCTION"
