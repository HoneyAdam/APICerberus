apiVersion: v1
kind: Secret
metadata:
  name: apicerberus-secrets
  namespace: apicerberus
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: secrets
type: Opaque
# NOTE: This base secret.yaml intentionally contains no real values.
# Secrets must be provided via one of:
#   1. kubectl create secret generic apicerberus-secrets \
#        --from-literal=jwt-secret=$(openssl rand -base64 32) \
#        --from-literal=admin-api-key=$(openssl rand -base64 32) \
#        -n apicerberus
#   2. Sealed Secrets / External Secrets Operator in overlays
#   3. Vault or Kubernetes External Secrets
# DO NOT set placeholder values in this file.
