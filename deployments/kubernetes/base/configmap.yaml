apiVersion: v1
kind: ConfigMap
metadata:
  name: apicerberus-config
  namespace: apicerberus
  labels:
    app.kubernetes.io/name: apicerberus
    app.kubernetes.io/component: config
data:
  apicerberus.yaml: |
    server:
      address: "0.0.0.0:8080"
      read_timeout: "30s"
      write_timeout: "30s"
      idle_timeout: "120s"
      max_header_bytes: 1048576

    https:
      enabled: false
      address: "0.0.0.0:8443"

    logging:
      level: "info"
      format: "json"
      output: "stdout"

    auth:
      jwt:
        enabled: true
        issuer: "apicerberus"
        expiry: "24h"
      api_key:
        enabled: true
        header: "X-API-Key"

    rate_limiting:
      enabled: true
      requests_per_second: 1000
      burst_size: 1500
      per_user: true
      per_ip: true

    cache:
      enabled: true
      max_size: 104857600
      ttl: "5m"
      max_item_size: 10485760

    metrics:
      enabled: true
      endpoint: "/metrics"
      port: 9876

    admin:
      enabled: true
      address: "0.0.0.0:9876"

    portal:
      enabled: true
      address: "0.0.0.0:9877"

    grpc:
      enabled: true
      address: "0.0.0.0:50051"

    raft:
      enabled: false
      bind_address: "0.0.0.0:12000"
