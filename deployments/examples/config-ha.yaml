# APICerebrus High Availability Configuration
# Use this for multi-node deployments with clustering

gateway:
  http_addr: ":8080"
  https_addr: ":8443"
  tls:
    auto: true
    acme_email: "admin@example.com"
    acme_dir: "./certs"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760
  grpc:
    enabled: true
    addr: ":50051"
    enable_web: true
    enable_transcoding: true

admin:
  addr: ":9876"
  api_key: "${ADMIN_API_KEY}"
  ui_enabled: true
  ui_path: "/admin"

portal:
  enabled: true
  addr: ":9877"
  path_prefix: "/portal"
  session:
    secret: "${SESSION_SECRET}"
    cookie_name: "apicerberus_session"
    max_age: "24h"
    secure: true

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: "/var/log/apicerberus/apicerberus.log"
  rotation:
    max_size_mb: 100
    max_backups: 10
    compress: true

store:
  path: "/var/lib/apicerberus/apicerberus.db"
  busy_timeout: "10s"
  journal_mode: "WAL"
  foreign_keys: true

# Redis for distributed rate limiting
redis:
  enabled: true
  address: "redis-cluster:6379"
  password: "${REDIS_PASSWORD}"
  database: 0
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool_size: 20
  min_idle_conns: 5
  key_prefix: "apicerberus:"
  fallback_to_local: true
  sync_local_on_miss: true

# Raft clustering configuration
raft:
  enabled: true
  node_id: "${RAFT_NODE_ID}"
  bind_addr: ":12000"
  data_dir: "/var/lib/apicerberus/raft"
  bootstrap: false
  peers:
    - "node1:12000"
    - "node2:12000"
    - "node3:12000"

# OpenTelemetry tracing
tracing:
  enabled: true
  service_name: "apicerberus"
  service_version: "${VERSION}"
  exporter: "otlp"
  otlp_endpoint: "http://jaeger:4318"
  sampling_rate: 0.1
  batch_timeout: "5s"
  max_queue_size: 2048

billing:
  enabled: true
  default_cost: 1
  route_costs:
    "premium-api": 5
    "standard-api": 1
  method_multipliers:
    GET: 1.0
    POST: 1.5
    PUT: 2.0
    DELETE: 1.0
  test_mode_enabled: false
  zero_balance_action: "reject"

audit:
  enabled: true
  buffer_size: 50000
  batch_size: 500
  flush_interval: "1s"
  retention_days: 90
  route_retention_days:
    "audit-heavy-route": 365
    "health-route": 7
  archive_enabled: true
  archive_dir: "/var/lib/apicerberus/audit-archive"
  archive_compress: true
  cleanup_interval: "1h"
  cleanup_batch_size: 5000
  max_request_body_bytes: 131072
  max_response_body_bytes: 131072
  mask_headers:
    - "Authorization"
    - "X-API-Key"
    - "Cookie"
    - "X-Auth-Token"
  mask_body_fields:
    - "password"
    - "token"
    - "secret"
    - "credit_card"
    - "ssn"

# Multiple upstream services
services:
  - name: "user-service"
    protocol: "http"
    upstream: "user-upstream"
    connect_timeout: "5s"
    read_timeout: "30s"

  - name: "payment-service"
    protocol: "http"
    upstream: "payment-upstream"
    connect_timeout: "10s"
    read_timeout: "60s"

  - name: "analytics-service"
    protocol: "http"
    upstream: "analytics-upstream"
    connect_timeout: "5s"
    read_timeout: "120s"

routes:
  - name: "users-api"
    service: "user-service"
    hosts:
      - "api.example.com"
    paths:
      - "/api/v1/users"
      - "/api/v1/users/*"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    strip_path: false
    priority: 100
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "token_bucket"
          scope: "consumer"
          limit: 1000
          window: "1m"
      - name: "billing"
        config:
          cost: 1

  - name: "payments-api"
    service: "payment-service"
    hosts:
      - "api.example.com"
    paths:
      - "/api/v1/payments"
      - "/api/v1/payments/*"
    methods:
      - "POST"
      - "GET"
    strip_path: false
    priority: 200
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "token_bucket"
          scope: "consumer"
          limit: 100
          window: "1m"
      - name: "billing"
        config:
          cost: 5

upstreams:
  - name: "user-upstream"
    algorithm: "least_conn"
    targets:
      - address: "user-svc-1:8080"
        weight: 100
      - address: "user-svc-2:8080"
        weight: 100
      - address: "user-svc-3:8080"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "10s"
        timeout: "5s"
        healthy_threshold: 2
        unhealthy_threshold: 3

  - name: "payment-upstream"
    algorithm: "round_robin"
    targets:
      - address: "payment-svc-1:8080"
        weight: 100
      - address: "payment-svc-2:8080"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "10s"
        timeout: "5s"
        healthy_threshold: 2
        unhealthy_threshold: 3

  - name: "analytics-upstream"
    algorithm: "round_robin"
    targets:
      - address: "analytics-svc-1:8080"
        weight: 100
      - address: "analytics-svc-2:8080"
        weight: 100

auth:
  api_key:
    key_names:
      - "X-API-Key"
      - "Authorization"
    query_names:
      - "api_key"
    cookie_names:
      - "api_key"

global_plugins:
  - name: "cors"
    config:
      allowed_origins:
        - "https://app.example.com"
        - "https://admin.example.com"
      allowed_methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
        - "PATCH"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
        - "X-API-Key"
        - "X-Request-ID"
      max_age: 600

  - name: "auth-apikey"
    config:
      key_names:
        - "X-API-Key"

  - name: "request-id"
    config:
      header_name: "X-Request-ID"

# Consumer definitions
consumers:
  - name: "mobile-app"
    api_keys:
      - key: "${MOBILE_APP_API_KEY}"
    rate_limit:
      requests_per_second: 100
      burst: 150
    acl_groups:
      - "mobile-tier"
    metadata:
      app_name: "Mobile App"
      tier: "standard"

  - name: "partner-integration"
    api_keys:
      - key: "${PARTNER_API_KEY}"
    rate_limit:
      requests_per_second: 500
      burst: 750
    acl_groups:
      - "partner-tier"
    metadata:
      app_name: "Partner Integration"
      tier: "premium"
