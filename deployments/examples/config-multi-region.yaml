# APICerebrus Multi-Region Configuration
# Use this for geographically distributed deployments

gateway:
  http_addr: ":8080"
  https_addr: ":8443"
  tls:
    auto: true
    acme_email: "admin@example.com"
    acme_dir: "./certs"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760
  grpc:
    enabled: true
    addr: ":50051"
    enable_web: true
    enable_transcoding: true

admin:
  addr: ":9876"
  api_key: "${ADMIN_API_KEY}"
  ui_enabled: true
  ui_path: "/admin"

portal:
  enabled: true
  addr: ":9877"
  path_prefix: "/portal"
  session:
    secret: "${SESSION_SECRET}"
    cookie_name: "apicerberus_session"
    max_age: "24h"
    secure: true

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: "/var/log/apicerberus/apicerberus.log"
  rotation:
    max_size_mb: 100
    max_backups: 10
    compress: true

store:
  path: "/var/lib/apicerberus/apicerberus.db"
  busy_timeout: "10s"
  journal_mode: "WAL"
  foreign_keys: true

# Redis for cross-region state sharing
redis:
  enabled: true
  # Use Redis Cluster for multi-region
  address: "${REDIS_CLUSTER_ENDPOINT}"
  password: "${REDIS_PASSWORD}"
  database: 0
  max_retries: 5
  dial_timeout: "10s"
  read_timeout: "5s"
  write_timeout: "5s"
  pool_size: 50
  min_idle_conns: 10
  key_prefix: "apicerberus:${REGION}:"
  fallback_to_local: true
  sync_local_on_miss: true

# Raft clustering across regions
raft:
  enabled: true
  node_id: "${RAFT_NODE_ID}"
  bind_addr: ":12000"
  data_dir: "/var/lib/apicerberus/raft"
  bootstrap: false
  # Include nodes from all regions
  peers:
    # US-East
    - "us-east-1:12000"
    - "us-east-2:12000"
    - "us-east-3:12000"
    # US-West
    - "us-west-1:12000"
    - "us-west-2:12000"
    # EU
    - "eu-west-1:12000"
    - "eu-west-2:12000"
    # Asia
    - "ap-southeast-1:12000"
    - "ap-northeast-1:12000"

# OpenTelemetry tracing with regional tags
tracing:
  enabled: true
  service_name: "apicerberus"
  service_version: "${VERSION}"
  exporter: "otlp"
  otlp_endpoint: "${OTEL_COLLECTOR_ENDPOINT}"
  sampling_rate: 0.05
  batch_timeout: "5s"
  max_queue_size: 4096
  max_export_batch_size: 1024
  attributes:
    region: "${REGION}"
    availability_zone: "${AZ}"
    environment: "production"

billing:
  enabled: true
  default_cost: 1
  route_costs:
    "premium-api": 5
    "standard-api": 1
  method_multipliers:
    GET: 1.0
    POST: 1.5
    PUT: 2.0
    DELETE: 1.0
  test_mode_enabled: false
  zero_balance_action: "reject"

audit:
  enabled: true
  buffer_size: 100000
  batch_size: 1000
  flush_interval: "1s"
  retention_days: 90
  route_retention_days:
    "audit-heavy-route": 365
    "health-route": 7
  archive_enabled: true
  # Use S3-compatible storage for multi-region
  archive_dir: "s3://${AUDIT_BUCKET}/${REGION}/audit-archive"
  archive_compress: true
  cleanup_interval: "1h"
  cleanup_batch_size: 10000
  max_request_body_bytes: 131072
  max_response_body_bytes: 131072
  mask_headers:
    - "Authorization"
    - "X-API-Key"
    - "Cookie"
    - "X-Auth-Token"
  mask_body_fields:
    - "password"
    - "token"
    - "secret"
    - "credit_card"
    - "ssn"

# Region-aware service configuration
services:
  - name: "user-service"
    protocol: "http"
    upstream: "user-upstream-${REGION}"
    connect_timeout: "5s"
    read_timeout: "30s"

  - name: "payment-service"
    protocol: "http"
    upstream: "payment-upstream-${REGION}"
    connect_timeout: "10s"
    read_timeout: "60s"

  - name: "analytics-service"
    protocol: "http"
    upstream: "analytics-upstream-global"
    connect_timeout: "5s"
    read_timeout: "120s"

routes:
  - name: "users-api"
    service: "user-service"
    hosts:
      - "api.example.com"
      - "api-${REGION}.example.com"
    paths:
      - "/api/v1/users"
      - "/api/v1/users/*"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    strip_path: false
    priority: 100
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "token_bucket"
          scope: "consumer"
          limit: 1000
          window: "1m"
      - name: "geo-routing"
        config:
          prefer_local: true
          fallback_regions:
            - "us-west"
            - "eu-west"
      - name: "billing"
        config:
          cost: 1

  - name: "payments-api"
    service: "payment-service"
    hosts:
      - "api.example.com"
      - "api-${REGION}.example.com"
    paths:
      - "/api/v1/payments"
      - "/api/v1/payments/*"
    methods:
      - "POST"
      - "GET"
    strip_path: false
    priority: 200
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "token_bucket"
          scope: "consumer"
          limit: 100
          window: "1m"
      - name: "billing"
        config:
          cost: 5

# Region-specific upstreams
upstreams:
  - name: "user-upstream-us-east"
    algorithm: "least_conn"
    targets:
      - address: "user-svc-use1-1.internal:8080"
        weight: 100
      - address: "user-svc-use1-2.internal:8080"
        weight: 100
      - address: "user-svc-use1-3.internal:8080"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "10s"
        timeout: "5s"
        healthy_threshold: 2
        unhealthy_threshold: 3

  - name: "user-upstream-us-west"
    algorithm: "least_conn"
    targets:
      - address: "user-svc-usw1-1.internal:8080"
        weight: 100
      - address: "user-svc-usw1-2.internal:8080"
        weight: 100

  - name: "user-upstream-eu-west"
    algorithm: "least_conn"
    targets:
      - address: "user-svc-euw1-1.internal:8080"
        weight: 100
      - address: "user-svc-euw1-2.internal:8080"
        weight: 100

  - name: "payment-upstream-us-east"
    algorithm: "round_robin"
    targets:
      - address: "payment-svc-use1-1.internal:8080"
        weight: 100
      - address: "payment-svc-use1-2.internal:8080"
        weight: 100

  - name: "payment-upstream-us-west"
    algorithm: "round_robin"
    targets:
      - address: "payment-svc-usw1-1.internal:8080"
        weight: 100
      - address: "payment-svc-usw1-2.internal:8080"
        weight: 100

  - name: "payment-upstream-eu-west"
    algorithm: "round_robin"
    targets:
      - address: "payment-svc-euw1-1.internal:8080"
        weight: 100
      - address: "payment-svc-euw1-2.internal:8080"
        weight: 100

  # Global upstream for analytics (read replicas)
  - name: "analytics-upstream-global"
    algorithm: "round_robin"
    targets:
      - address: "analytics-use1.internal:8080"
        weight: 100
      - address: "analytics-usw1.internal:8080"
        weight: 100
      - address: "analytics-euw1.internal:8080"
        weight: 100
      - address: "analytics-apse1.internal:8080"
        weight: 100

auth:
  api_key:
    key_names:
      - "X-API-Key"
      - "Authorization"
    query_names:
      - "api_key"
    cookie_names:
      - "api_key"

global_plugins:
  - name: "cors"
    config:
      allowed_origins:
        - "https://app.example.com"
        - "https://admin.example.com"
        - "https://*.example.com"
      allowed_methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
        - "PATCH"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
        - "X-API-Key"
        - "X-Request-ID"
        - "X-Region"
      max_age: 600

  - name: "auth-apikey"
    config:
      key_names:
        - "X-API-Key"

  - name: "request-id"
    config:
      header_name: "X-Request-ID"

  - name: "region-header"
    config:
      header_name: "X-Served-By-Region"
      value: "${REGION}"

consumers:
  - name: "mobile-app"
    api_keys:
      - key: "${MOBILE_APP_API_KEY}"
    rate_limit:
      requests_per_second: 100
      burst: 150
    acl_groups:
      - "mobile-tier"
    metadata:
      app_name: "Mobile App"
      tier: "standard"

  - name: "partner-integration"
    api_keys:
      - key: "${PARTNER_API_KEY}"
    rate_limit:
      requests_per_second: 500
      burst: 750
    acl_groups:
      - "partner-tier"
    metadata:
      app_name: "Partner Integration"
      tier: "premium"
