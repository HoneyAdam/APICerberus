# APICerebrus Minimal Production Configuration
# Use this for single-node deployments with basic requirements

gateway:
  http_addr: ":8080"
  https_addr: ":8443"
  tls:
    auto: true
    acme_email: "admin@example.com"
    acme_dir: "./certs"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576
  max_body_bytes: 10485760

admin:
  addr: ":9876"
  api_key: "${ADMIN_API_KEY}"
  ui_enabled: true
  ui_path: "/admin"

portal:
  enabled: true
  addr: ":9877"
  path_prefix: "/portal"
  session:
    secret: "${SESSION_SECRET}"
    cookie_name: "apicerberus_session"
    max_age: "24h"
    secure: true

logging:
  level: "info"
  format: "json"
  output: "stdout"

store:
  path: "./data/apicerberus.db"
  busy_timeout: "5s"
  journal_mode: "WAL"
  foreign_keys: true

billing:
  enabled: true
  default_cost: 1
  test_mode_enabled: false
  zero_balance_action: "reject"

audit:
  enabled: true
  buffer_size: 10000
  batch_size: 100
  flush_interval: "1s"
  retention_days: 30
  archive_enabled: true
  archive_dir: "./data/audit-archive"
  max_request_body_bytes: 65536
  max_response_body_bytes: 65536
  mask_headers:
    - "Authorization"
    - "X-API-Key"
    - "Cookie"
  mask_body_fields:
    - "password"
    - "token"
    - "secret"

# Minimal single upstream service example
services:
  - name: "api-backend"
    protocol: "http"
    upstream: "default-upstream"
    connect_timeout: "5s"
    read_timeout: "30s"

routes:
  - name: "api-route"
    service: "api-backend"
    hosts:
      - "api.example.com"
    paths:
      - "/api"
      - "/api/*"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    strip_path: false
    priority: 100
    plugins:
      - name: "rate-limit"
        config:
          algorithm: "token_bucket"
          scope: "ip"
          limit: 100
          window: "1m"

upstreams:
  - name: "default-upstream"
    algorithm: "round_robin"
    targets:
      - address: "localhost:3000"
        weight: 100
    health_check:
      active:
        path: "/health"
        interval: "30s"
        timeout: "5s"
        healthy_threshold: 2
        unhealthy_threshold: 3

auth:
  api_key:
    key_names:
      - "X-API-Key"
      - "Authorization"

global_plugins:
  - name: "cors"
    config:
      allowed_origins:
        - "https://app.example.com"
      allowed_methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
        - "X-API-Key"
      max_age: 600
  - name: "auth-apikey"
    config:
      key_names:
        - "X-API-Key"
