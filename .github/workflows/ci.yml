name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Lint and Format Checks
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run go vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=10m --out-format=colored-line-number

    - name: Check Go mod tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Check formatting
      run: |
        if [ -n "$(go fmt ./...)" ]; then
          echo "Code is not formatted. Run 'go fmt ./...'"
          exit 1
        fi

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.26']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Run unit tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Generate coverage report
      if: matrix.os == 'ubuntu-latest'
      run: |
        go tool cover -html=coverage.out -o coverage.html
        go tool cover -func=coverage.out

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        fail_ci_if_error: false
        verbose: true

    - name: Check coverage threshold
      if: matrix.os == 'ubuntu-latest'
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 70" | bc -l) )); then
          echo "Coverage below 70% threshold"
          exit 1
        fi

    - name: Upload coverage artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html
        retention-days: 7

  # ============================================================================
  # Web Dashboard Tests
  # ============================================================================
  web-test:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: web
      run: npm ci

    - name: Run linter
      working-directory: web
      run: npm run lint

    - name: Run type check
      working-directory: web
      run: npm run typecheck

    - name: Run tests
      working-directory: web
      run: npm run test:run

    - name: Build web dashboard
      working-directory: web
      run: npm run build

  # ============================================================================
  # Build Binaries
  # ============================================================================
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Build web UI
      working-directory: web
      run: npm ci && npm run build

    - name: Build binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
      run: |
        VERSION=${{ github.ref_name }}
        VERSION=${VERSION#v}
        VERSION=${VERSION:-dev}
        COMMIT=${{ github.sha }}
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        OUTPUT="apicerberus-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
        if [ "${{ matrix.os }}" = "windows" ]; then
          OUTPUT="${OUTPUT}.exe"
        fi

        mkdir -p dist
        go build -ldflags="-s -w \
          -X github.com/APICerberus/APICerebrus/internal/version.Version=${VERSION} \
          -X github.com/APICerberus/APICerebrus/internal/version.Commit=${COMMIT} \
          -X github.com/APICerberus/APICerebrus/internal/version.BuildTime=${BUILD_TIME}" \
          -o "dist/${OUTPUT}" ./cmd/apicerberus

        echo "Built: dist/${OUTPUT}"
        ls -la dist/

    - name: Create archive
      run: |
        VERSION=${{ github.ref_name }}
        VERSION=${VERSION#v}
        VERSION=${VERSION:-dev}

        cd dist
        ARCHIVE="apicerberus-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"

        if [ "${{ matrix.os }}" = "windows" ]; then
          zip "${ARCHIVE}.zip" "apicerberus-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.exe"
          echo "ASSET=${ARCHIVE}.zip" >> $GITHUB_ENV
        else
          tar -czf "${ARCHIVE}.tar.gz" "apicerberus-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          echo "ASSET=${ARCHIVE}.tar.gz" >> $GITHUB_ENV
        fi

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/${{ env.ASSET }}
        retention-days: 7

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-test:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run integration tests
      run: go test -v -tags=integration -timeout 10m ./test/...

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run E2E tests
      run: go test -v -tags=e2e -timeout 15m ./test/...

  # ============================================================================
  # Benchmark Tests
  # ============================================================================
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run benchmarks
      run: go test -bench=. -benchmem -benchtime=1s ./... -timeout 10m | tee benchmark.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark.txt
        retention-days: 30

  # ============================================================================
  # Security Scans
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run gosec
      uses: securego/gosec@v2.22.10
      with:
        args: '-fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'gosec-results.sarif'

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
        govulncheck ./...

  # ============================================================================
  # Build and Push Docker Image
  # ============================================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test, web-test]
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=,suffix=,format=short

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ github.ref_name }}
          COMMIT=${{ github.sha }}

    - name: Export image digest
      run: |
        echo "Image digest: ${{ steps.build.outputs.digest }}"

  # ============================================================================
  # Helm Chart Validation
  # ============================================================================
  helm:
    name: Helm Chart
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'

    - name: Lint Helm chart
      run: |
        helm lint deployments/helm/apicerberus

    - name: Template Helm chart
      run: |
        helm template apicerberus deployments/helm/apicerberus \
          --set secrets.jwtSecret=test-secret \
          --set secrets.adminApiKey=test-key

    - name: Validate Kubernetes manifests
      run: |
        helm template apicerberus deployments/helm/apicerberus \
          --set secrets.jwtSecret=test-secret \
          --set secrets.adminApiKey=test-key | \
          kubectl apply --dry-run=client -f -

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker, helm, integration-test]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    permissions:
      contents: read
      packages: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        chmod 600 kubeconfig

    - name: Deploy to staging with Helm
      run: |
        export KUBECONFIG=kubeconfig
        helm upgrade --install apicerberus deployments/helm/apicerberus \
          --namespace apicerberus-staging \
          --create-namespace \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=sha-$(echo ${{ github.sha }} | cut -c1-7) \
          --set image.pullPolicy=Always \
          --set secrets.jwtSecret=${{ secrets.STAGING_JWT_SECRET }} \
          --set secrets.adminApiKey=${{ secrets.STAGING_ADMIN_API_KEY }} \
          --set replicaCount=1 \
          --set resources.requests.cpu=100m \
          --set resources.requests.memory=128Mi \
          --set resources.limits.cpu=500m \
          --set resources.limits.memory=512Mi \
          --wait --timeout=300s

    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout status deployment/apicerberus -n apicerberus-staging --timeout=120s
        echo "Staging deployment successful"

    - name: Cleanup kubeconfig
      if: always()
      run: rm -f kubeconfig

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  # SECURITY: H-013 - Production deployment REQUIRES manual approval gate.
  #
  # PREREQUISITE: The GitHub Environment "production" must have protection rules
  # configured with required reviewers BEFORE this workflow can deploy to prod.
  #
  # To configure protection rules:
  #   1. Go to repo Settings → Environments → production
  #   2. Add "Required reviewers" (at least 1 approver)
  #   3. Optionally add deployment branch rule (e.g., only "main" or tags matching "v*")
  #
  # Without this configuration, the `environment: production` reference alone
  # does NOT block auto-deployment. The environment must have active protection rules.
  #
  # Reference: https://docs.github.com/en/actions/deployment/protecting-security-releases/configuring-environment-protection-rules
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker, helm, integration-test, e2e-test, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://api.example.com
    permissions:
      contents: read
      packages: read
      deployments: write  # Required for Helm deployment status updates
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        chmod 600 kubeconfig

    - name: Deploy to production with Helm
      run: |
        export KUBECONFIG=kubeconfig
        helm upgrade --install apicerberus deployments/helm/apicerberus \
          --namespace apicerberus \
          --create-namespace \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=${{ github.ref_name }} \
          --set image.pullPolicy=IfNotPresent \
          --set secrets.jwtSecret=${{ secrets.PRODUCTION_JWT_SECRET }} \
          --set secrets.adminApiKey=${{ secrets.PRODUCTION_ADMIN_API_KEY }} \
          --set replicaCount=3 \
          --set autoscaling.enabled=true \
          --set autoscaling.minReplicas=3 \
          --set autoscaling.maxReplicas=10 \
          --set resources.requests.cpu=200m \
          --set resources.requests.memory=256Mi \
          --set resources.limits.cpu=1000m \
          --set resources.limits.memory=1Gi \
          --set podDisruptionBudget.enabled=true \
          --set networkPolicy.enabled=true \
          --wait --timeout=300s

    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout status deployment/apicerberus -n apicerberus --timeout=180s
        echo "Production deployment successful"

    - name: Cleanup kubeconfig
      if: always()
      run: rm -f kubeconfig

